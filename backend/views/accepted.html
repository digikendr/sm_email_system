<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice Accepted — Sugandh Mart</title>
  <style>
    :root {
      --ink: #1a1410;
      --paper: #f6f0e4;
      --paper2: #fffaf0;
      --good: #2b8a3e;
      --line: #d8cbb0;
      --amber: #c8841f;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: var(--paper);
      color: var(--ink);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background-color: var(--paper2);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 40px 30px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      box-shadow: 0 10px 30px rgba(40, 28, 12, 0.1);
    }
    .icon-container {
      width: 80px;
      height: 80px;
      background-color: #e2ede4;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto 24px;
    }
    .icon {
      font-size: 40px;
      color: var(--good);
      line-height: 1;
    }
    h1 {
      font-family: "Georgia", serif;
      font-size: 26px;
      color: var(--ink);
      margin-bottom: 12px;
    }
    p {
      font-size: 15px;
      color: #5c4e43;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .details {
      background-color: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      text-align: left;
      font-size: 13px;
      margin-bottom: 24px;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px dashed #e8dec8;
    }
    .detail-row:last-child {
      border-bottom: none;
      font-weight: 700;
      font-size: 14px;
    }
    .detail-label {
      color: #8a7a60;
    }
    .brand-mark {
      font-family: Georgia, serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--amber);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-container">
      <span class="icon">✓</span>
    </div>
    <h1>Invoice Accepted</h1>
    <p>Thank you. The purchase invoice has been successfully accepted and marked as settled in the Sugandh Mart ledger.</p>
    
    <div class="details">
      <div class="detail-row">
        <span class="detail-label">Invoice Number</span>
        <span><%= invoice_number %></span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Seller</span>
        <span><%= from_entity %></span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Buyer</span>
        <span><%= to_entity %></span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Grand Total</span>
        <span>₹<%= grand_total %></span>
      </div>
    </div>
    
    <div class="brand-mark">Sugandh Mart</div>
  </div>
</body>
</html>
