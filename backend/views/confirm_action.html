<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirm Action — Sugandh Mart</title>
  <style>
    :root {
      --ink: #1a1410;
      --paper: #f6f0e4;
      --paper2: #fffaf0;
      --good: #2b8a3e;
      --bad: #9c4a3c;
      --line: #d8cbb0;
      --amber: #c8841f;
      --muted: #8a7a60;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: var(--paper);
      color: var(--ink);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background-color: var(--paper2);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 40px 30px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      box-shadow: 0 10px 30px rgba(40, 28, 12, 0.1);
    }
    .icon-container {
      width: 80px;
      height: 80px;
      background-color: #f4ece0;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto 24px;
    }
    .icon {
      font-size: 32px;
      line-height: 1;
    }
    h1 {
      font-family: "Georgia", serif;
      font-size: 26px;
      color: var(--ink);
      margin-bottom: 12px;
    }
    p {
      font-size: 15px;
      color: #5c4e43;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .details {
      background-color: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      text-align: left;
      font-size: 13px;
      margin-bottom: 24px;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px dashed #e8dec8;
    }
    .detail-row:last-child {
      border-bottom: none;
      font-weight: 700;
      font-size: 14px;
    }
    .detail-label {
      color: var(--muted);
    }
    .brand-mark {
      font-family: Georgia, serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--amber);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 20px;
    }
    .btn {
      display: inline-block;
      text-decoration: none;
      padding: 14px 30px;
      border-radius: 6px;
      font-weight: bold;
      font-size: 16px;
      color: white !important;
      text-align: center;
      cursor: pointer;
      border: none;
      width: 100%;
      transition: opacity 0.2s;
    }
    .btn:hover {
      opacity: 0.9;
    }
    .btn-accept {
      background-color: var(--good);
    }
    .btn-reject {
      background-color: var(--bad);
    }
    .error-msg {
      color: var(--bad);
      font-size: 14px;
      margin-bottom: 15px;
      font-weight: 600;
    }
    .input-group {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .prefix-box {
      font-weight: 700;
      font-size: 18px;
      color: var(--ink);
      background-color: #e8dec8;
      padding: 10px 15px;
      border-radius: 6px;
      border: 1px solid var(--line);
    }
    input[type="text"] {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      font-size: 18px;
      width: 160px;
      outline: none;
      font-family: monospace;
      text-align: center;
    }
    input[type="text"]:focus {
      border-color: var(--amber);
      box-shadow: 0 0 0 2px rgba(200, 132, 31, 0.2);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-container">
      <span class="icon">⚠️</span>
    </div>
    <h1>Confirm <%= action_capitalized %></h1>
    <p><%= prompt_text %> <strong><%= action %></strong> this invoice.</p>
    
    <%= error_block %>

    <form action="/invoice/<%= action %>?token=<%= token %>" method="POST">
      <%= input_block %>

      <div class="details">
        <div class="detail-row">
          <span class="detail-label">Seller</span>
          <span><%= from_entity %></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Buyer</span>
          <span><%= to_entity %></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Grand Total</span>
          <span>₹<%= grand_total %></span>
        </div>
      </div>
      
      <button type="submit" class="btn btn-<%= action %>">Confirm <%= action_capitalized %></button>
    </form>
    
    <div class="brand-mark">Sugandh Mart</div>
  </div>
</body>
</html>
